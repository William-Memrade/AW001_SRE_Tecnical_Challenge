parameters:
  - name: K8S_MANUAL_URL
    displayName: "URL Nginx (Manifiestos K8s)"
    type: string
    default: ""

  - name: HELM_URL
    displayName: "URL Nginx (Helm Chart)"
    type: string
    default: ""

  - name: TERRAFORM_URL
    displayName: "URL ALB (Terraform Fleet)"
    type: string
    default: ""

  - name: RPS
    displayName: "Peticiones por segundo"
    type: number
    default: 50

  - name: DURATION
    displayName: "Duración prueba (segundos)"
    type: number
    default: 60

trigger: none

pool:
  name: k8s-agents

jobs:

- job: StressTest
  displayName: "HTTP Load Test"
  timeoutInMinutes: 30

  steps:

  - checkout: self

  - task: Bash@3
    displayName: "Preparar Script"
    inputs:
      targetType: 'inline'
      script: |
        chmod +x $(System.DefaultWorkingDirectory)/scripts/stress-test.sh

  - task: Bash@3
    displayName: "Test K8s Manual"
    condition: ne('${{ parameters.K8S_MANUAL_URL }}','')
    inputs:
      targetType: 'inline'
      script: |
        echo "🔥 Ejecutando prueba contra K8s Manual"
        $(System.DefaultWorkingDirectory)/scripts/stress-test.sh \
        "${{ parameters.K8S_MANUAL_URL }}" \
        ${{ parameters.RPS }} \
        ${{ parameters.DURATION }}

  - task: Bash@3
    displayName: "Test Helm Deployment"
    condition: ne('${{ parameters.HELM_URL }}','')
    inputs:
      targetType: 'inline'
      script: |
        echo "🔥 Ejecutando prueba contra Helm Deployment"
        $(System.DefaultWorkingDirectory)/scripts/stress-test.sh \
        "${{ parameters.HELM_URL }}" \
        ${{ parameters.RPS }} \
        ${{ parameters.DURATION }}

  - task: Bash@3
    displayName: "Test Terraform ALB"
    condition: ne('${{ parameters.TERRAFORM_URL }}','')
    inputs:
      targetType: 'inline'
      script: |
        echo "🔥 Ejecutando prueba contra Terraform ALB"
        $(System.DefaultWorkingDirectory)/scripts/stress-test.sh \
        "${{ parameters.TERRAFORM_URL }}" \
        ${{ parameters.RPS }} \
        ${{ parameters.DURATION }}

  - task: Bash@3
    displayName: "Finalización"
    inputs:
      targetType: 'inline'
      script: |
        echo ""
        echo "========================================"
        echo "✅ Todas las pruebas de carga finalizaron"
        echo "========================================"
